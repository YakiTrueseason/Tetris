<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="./css/Canvas.css">
</head>

<body>
    <h1>テトリス</h1>
    <h3>ゲーム操作方法</h3>
    <ul>
        <li>
            <p>上矢印：回転</p>
        </li>
        <li>
            <p>右矢印：右移動</p>
        </li>
        <li>
            <p>左矢印：左移動</p>
        </li>
        <li>
            <p>更新停止：ｐ</p>
        </li>
        <li>
            <p>リセット：ｒ</p>
        </li>
    </ul>
    <canvas id="tetris" width="240" height="400"></canvas>

    <script src="./js/Canvas.js"></script>
</body>

</html>
